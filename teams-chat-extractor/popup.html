<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams Chat Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1b1b2e;
    color: #e0e0e0;
    width: 380px;
    min-height: 200px;
    padding: 1rem;
  }

  h1 {
    font-size: 1rem;
    font-weight: 700;
    color: #7b83eb;
    margin-bottom: 0.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .subtitle {
    font-size: 0.72rem;
    color: #555;
    margin-bottom: 1rem;
  }

  .row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    align-items: center;
  }

  label {
    font-size: 0.78rem;
    color: #888;
    white-space: nowrap;
  }

  select {
    background: #0f0f1a;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 0.35rem 0.6rem;
    font-size: 0.82rem;
    outline: none;
  }

  .btn-extract {
    width: 100%;
    padding: 0.65rem;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #7b83eb, #4b53d1);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 0.75rem;
    transition: opacity 0.15s;
  }

  .btn-extract:hover { opacity: 0.9; }
  .btn-extract:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    font-size: 0.78rem;
    min-height: 1.2em;
    margin-bottom: 0.5rem;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    display: none;
  }

  .status.show { display: block; }
  .status.ok   { background: #0f2a1f; color: #4ade80; border: 1px solid #166534; }
  .status.err  { background: #2a0f0f; color: #f87171; border: 1px solid #991b1b; }
  .status.info { background: #0f1a2f; color: #93c5fd; border: 1px solid #1d4ed8; }

  .preview-wrap {
    display: none;
    margin-top: 0.5rem;
  }

  .preview-wrap.show { display: block; }

  .preview-label {
    font-size: 0.72rem;
    color: #555;
    margin-bottom: 0.3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .preview-label span { color: #7b83eb; font-weight: 600; }

  textarea {
    width: 100%;
    height: 180px;
    background: #0a0a14;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    color: #94a3b8;
    font-family: monospace;
    font-size: 0.7rem;
    padding: 0.5rem;
    resize: vertical;
    outline: none;
  }

  .actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .btn-copy, .btn-dl {
    flex: 1;
    padding: 0.5rem;
    border-radius: 6px;
    border: none;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-copy {
    background: #1e293b;
    color: #93c5fd;
    border: 1px solid #334155;
  }

  .btn-dl {
    background: #1e2e1e;
    color: #4ade80;
    border: 1px solid #166534;
  }

  .btn-copy:hover, .btn-dl:hover { opacity: 0.8; }

  .debug-toggle {
    font-size: 0.68rem;
    color: #444;
    cursor: pointer;
    text-align: center;
    margin-top: 0.5rem;
    text-decoration: underline;
  }

  #debugInfo {
    display: none;
    font-size: 0.65rem;
    color: #555;
    font-family: monospace;
    margin-top: 0.3rem;
    max-height: 80px;
    overflow-y: auto;
    background: #0a0a14;
    padding: 0.4rem;
    border-radius: 4px;
    border: 1px solid #1a1a2e;
  }
</style>
</head>
<body>

<h1>💬 Teams Chat Extractor</h1>
<p class="subtitle">ブラウザ版 Teams のチャットを抽出します</p>

<div class="row">
  <label>出力形式:</label>
  <select id="formatSelect">
    <option value="csv">CSV（Excel向け）</option>
    <option value="text">テキスト（読みやすい形式）</option>
    <option value="tsv">TSV（タブ区切り）</option>
    <option value="json">JSON</option>
  </select>
</div>

<div class="row">
  <label>文字コード:</label>
  <select id="encodingSelect">
    <option value="utf8bom">UTF-8 BOM付き（Excel推奨）</option>
    <option value="utf8">UTF-8</option>
  </select>
</div>

<button class="btn-extract" id="extractBtn" onclick="extract()">
  ⬇ チャットを抽出
</button>

<div class="status" id="status"></div>

<div class="preview-wrap" id="previewWrap">
  <div class="preview-label">
    プレビュー <span id="countLabel"></span>
  </div>
  <textarea id="preview" readonly></textarea>
  <div class="actions">
    <button class="btn-copy" onclick="copyToClipboard()">📋 クリップボードにコピー</button>
    <button class="btn-dl" onclick="downloadFile()">💾 ファイルに保存</button>
  </div>
</div>

<div class="debug-toggle" onclick="toggleDebug()">▼ デバッグ情報</div>
<div id="debugInfo"></div>

<script src="popup.js"></script>
</body>
</html>
